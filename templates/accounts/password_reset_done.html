{% extends 'base.html' %}
{% block title %}Reset Link Sent — PremiumShop AI{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14 flex items-center justify-center">
  <div class="w-full max-w-md bg-white rounded-3xl border border-gray-100 shadow-xl p-8 space-y-6 text-center animate-fade-in">
    <div class="space-y-3">
      <div class="w-12 h-12 rounded-2xl bg-green-50 flex items-center justify-center mx-auto shadow-md">
        <i class="fa-solid fa-paper-plane text-green-600 text-lg"></i>
      </div>
      <h1 class="font-display font-black text-2xl text-gray-900">Check Your Inbox</h1>
      <p class="text-gray-400 text-xs leading-relaxed max-w-xs mx-auto">
        We've emailed you instructions to reset your password. If you don't receive it in a few minutes, check your spam folder.
      </p>
    </div>

    <div class="pt-4 border-t border-gray-100 text-xs text-gray-500">
      <a href="/accounts/login/" class="text-brand-600 font-bold hover:underline">Back to Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
