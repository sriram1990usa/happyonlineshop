{% extends 'base.html' %}
{% block title %}Password Reset Complete — PremiumShop AI{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14 flex items-center justify-center">
  <div class="w-full max-w-md bg-white rounded-3xl border border-gray-100 shadow-xl p-8 space-y-6 text-center animate-fade-in">
    <div class="space-y-3">
      <div class="w-12 h-12 rounded-2xl bg-green-50 flex items-center justify-center mx-auto shadow-md animate-bounce">
        <i class="fa-solid fa-circle-check text-green-600 text-lg"></i>
      </div>
      <h1 class="font-display font-black text-2xl text-gray-900">Password Reset Done</h1>
      <p class="text-gray-400 text-xs leading-relaxed max-w-xs mx-auto">
        Your password has been successfully set. You can now log in using your new credentials.
      </p>
    </div>

    <div class="pt-4 border-t border-gray-100">
      <a href="{% url 'accounts:login' %}" class="w-full py-3.5 btn-primary rounded-xl font-bold shadow-lg block hover:scale-[1.01] transition-transform">
        Sign In Now
      </a>
    </div>
  </div>
</div>
{% endblock %}
